<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Interface chauffeur — Taxi Pointe-Noire" />
  <title>Taxi PNR — Chauffeur</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     LOADER
══════════════════════════════════════════ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p style="font-size:0.85rem;color:var(--text-muted)">Chargement…</p>
</div>

<!-- ══════════════════════════════════════════
     APP CHAUFFEUR
══════════════════════════════════════════ -->
<div id="driver-app">

  <!-- ── ÉCRAN DE CONNEXION ── -->
  <section id="login-screen">

    <div class="login-logo">🚖</div>

    <div class="login-title">
      <h1>Espace Chauffeur</h1>
      <p>Connectez-vous pour commencer votre service</p>
    </div>

    <form class="login-form" id="login-form" novalidate>

      <div class="input-group">
        <label for="phone-input">Numéro de téléphone</label>
        <input
          type="tel"
          id="phone-input"
          placeholder="242XXXXXXXXX"
          maxlength="12"
          inputmode="numeric"
          autocomplete="tel"
          required
        />
      </div>

      <div class="error-msg" id="error-msg"></div>

      <button type="submit" class="btn-primary" id="login-btn">
        Se connecter
      </button>

    </form>

    <p style="font-size:0.78rem;color:var(--text-muted);text-align:center;max-width:280px">
      Entrez le numéro enregistré par votre administrateur
    </p>

  </section>

  <!-- ── TABLEAU DE BORD ── -->
  <section id="dashboard-screen">

    <!-- Header -->
    <div class="dashboard-header">
      <img class="dashboard-photo" id="dash-photo" src="" alt="Photo" />
      <div class="dashboard-info">
        <h2 id="dash-name">—</h2>
        <div class="dash-plate" id="dash-plate">—</div>
      </div>
      <button class="logout-btn" id="logout-btn">Déconnexion</button>
    </div>

    <!-- Toggle statut -->
    <div class="status-section">
      <div class="status-label">Mon statut</div>
      <div class="toggle-container">

        <button class="big-toggle unavailable" id="status-toggle">
          <span class="toggle-icon" id="toggle-icon">❌</span>
          <span id="toggle-label">Non disponible</span>
        </button>

        <p class="status-text-detail" id="status-detail">
          Appuyez pour vous mettre en service
        </p>

      </div>
    </div>

    <!-- Mini-carte -->
    <div class="map-section">
      <div class="map-label">Ma position GPS</div>
      <div id="driver-map"></div>
      <div class="gps-status">
        <div class="gps-dot" id="gps-dot"></div>
        <span id="gps-text">En attente du GPS…</span>
      </div>
    </div>

  </section>

</div><!-- /driver-app -->

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/driver.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.warn('SW error:', err));
  }
</script>

</body>
</html>
