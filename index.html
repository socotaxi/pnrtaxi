<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Trouvez un taxi à Pointe-Noire instantanément" />
  <title>Taxi Pointe-Noire</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ══════════════════════════════════════════
     LOADER INITIAL
══════════════════════════════════════════ -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <p style="font-size:0.85rem;color:var(--text-muted)">Chargement de la carte…</p>
</div>

<!-- ══════════════════════════════════════════
     APP PASSAGER
══════════════════════════════════════════ -->
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div>
      <h1>🚖 Taxi Pointe-Noire</h1>
      <span class="header-sub">Trouvez votre taxi en temps réel</span>
    </div>
    <span class="driver-count-badge" id="driver-count">0 chauffeurs</span>
  </header>

  <!-- Carte Leaflet -->
  <div id="map"></div>

  <!-- Toast GPS -->
  <div class="gps-toast" id="gps-toast">📍 Localisation en cours…</div>

</div><!-- /app -->

<!-- ══════════════════════════════════════════
     PANNEAU CHAUFFEUR (slide-up)
══════════════════════════════════════════ -->
<div id="driver-panel" role="dialog" aria-modal="true" aria-label="Informations chauffeur">

  <div class="panel-handle"></div>
  <button class="panel-close" id="panel-close" aria-label="Fermer">✕</button>

  <!-- Profil -->
  <div class="driver-profile">
    <img class="driver-photo" id="panel-photo" src="" alt="Photo du chauffeur" />
    <div class="driver-info">
      <h2 id="panel-name">—</h2>
      <div class="plate" id="panel-plate">—</div>
      <div class="vehicle" id="panel-vehicle">—</div>
    </div>
  </div>

  <!-- Distance + Disponibilité -->
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:0;margin-bottom:4px;">
    <span class="distance-badge" id="panel-distance">— km</span>
    <span class="availability-badge" id="panel-availability">—</span>
  </div>

  <!-- CTA WhatsApp ou badge indisponible -->
  <div id="panel-cta"></div>

</div><!-- /driver-panel -->

<!-- ══════════════════════════════════════════
     SCRIPTS
══════════════════════════════════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/passenger.js"></script>

<script>
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .catch(err => console.warn('SW error:', err));
  }
</script>

</body>
</html>
